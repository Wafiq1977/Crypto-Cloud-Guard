kind = "web"
previewPath = "/"
title = "CipherDrive"
version = "1.0.0"
id = "artifacts/cipherdrive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25689

[services.development]
run = "pnpm --filter @workspace/cipherdrive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cipherdrive", "run", "build" ]
publicDir = "artifacts/cipherdrive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25689"
BASE_PATH = "/"
